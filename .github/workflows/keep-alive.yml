name: Keep Alive — Streamlit + API

on:
  schedule:
    - cron: '0 9 * * *'   # 06:00 BRT (UTC-3)
    - cron: '0 15 * * *'  # 12:00 BRT (UTC-3)
    - cron: '0 19 * * *'  # 16:00 BRT (UTC-3)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Pinga a API (Render)
        run: |
          curl --retry 10 --retry-delay 15 --retry-all-errors \
               --max-time 90 -f \
               "${{ secrets.RENDER_URL }}/health"

      - name: Pinga o Streamlit
        run: |
          curl --max-time 30 --max-redirs 3 \
               "${{ secrets.STREAMLIT_URL }}"
