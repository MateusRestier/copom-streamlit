name: Keep Alive — Streamlit

on:
  schedule:
    - cron: '0 15 * * *'  # 12:00 BRT (UTC-3)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Pinga o Streamlit
        run: |
          curl --retry 5 --retry-delay 30 --retry-all-errors \
               --max-time 60 -f -L \
               "${{ secrets.STREAMLIT_URL }}"
